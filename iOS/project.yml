name: CandleShelf
options:
  bundleIdPrefix: com.shimondeitel.candleshelf
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  CandleShelf:
    type: application
    platform: iOS
    sources:
      - path: CandleShelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.candleshelf
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: CandleShelf/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CandleShelfTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CandleShelfTests
      - path: CandleShelf.storekit
    dependencies:
      - target: CandleShelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.candleshelf.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CandleShelfUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CandleShelfUITests
    dependencies:
      - target: CandleShelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.candleshelf.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  CandleShelf:
    build:
      targets:
        CandleShelf: all
        CandleShelfTests: [test]
        CandleShelfUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: CandleShelf.storekit
    test:
      config: Debug
      storeKitConfiguration: CandleShelf.storekit
      targets:
        - CandleShelfTests
        - CandleShelfUITests
    archive:
      config: Release
